name: Expo-Detox-AR001

on: [push, pull_request]

jobs:
  e2e:
    runs-on: macos-latest      # macOS = emulador Android rápido + hardware acelerado
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: Install deps
        run: npm ci

      - name: Setup Expo & Detox
        run: |
          npm i -g @expo/cli detox-cli
          brew install android-commandlinetools

      - name: Download Expo Go
        run: |
          wget -O Exponent.apk https://d1ahtucjixef4r.cloudfront.net/Exponent-2.29.8.apk

      - name: Run Detox
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          script: |
            npm start &
            sleep 20
            npm run e2e:build
            npm run e2e:test